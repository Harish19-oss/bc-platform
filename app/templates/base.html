<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}BC Platform{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bc-navy: #151B33;
      --bc-emerald: #10B981;
    }
    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background-color: #F8F9FA;
    }
    h1, h2, h3, h4, .navbar-brand {
      font-family: 'Space Grotesk', sans-serif;
    }
    .navbar-bc {
      background-color: var(--bc-navy);
    }
    .btn-primary {
      background-color: var(--bc-emerald);
      border-color: var(--bc-emerald);
    }
    .btn-primary:hover {
      background-color: #0ea371;
      border-color: #0ea371;
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <nav class="navbar navbar-dark navbar-bc">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{{ url_for('main.index') }}">BC Platform</a>
      <div>
        <a href="{{ url_for('genes.gene_list') }}" class="btn btn-sm btn-outline-light me-2">Genes</a>
        <a href="{{ url_for('proteins.protein_list') }}" class="btn btn-sm btn-outline-light me-2">Proteins</a>
        <a href="{{ url_for('admin.login') }}" class="btn btn-sm btn-outline-light">Admin</a>
      </div>
    </div>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="text-center text-muted py-4 mt-5">
    <small>Breast Cancer Integrated Bioinformatics Platform</small>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
